apiVersion: apps/v1
kind: Deployment
metadata:
  name: sovereignmind-fastapi
  labels:
    app: sovereignmind-fastapi
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sovereignmind-fastapi
  template:
    metadata:
      labels:
        app: sovereignmind-fastapi
    spec:
      containers:
      - name: fastapi
        image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/sovereignmind-fastapi:latest
        ports:
        - containerPort: 8000
        - containerPort: 50051
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: sovereignmind-secrets
              key: database-url
        - name: REDIS_URL
          value: "redis://sovereignmind-redis:6379/0"
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: "500m"
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: sovereignmind-fastapi-service
spec:
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  - name: grpc
    port: 50051
    targetPort: 50051
  selector:
    app: sovereignmind-fastapi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sovereignmind-gateway
  labels:
    app: sovereignmind-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sovereignmind-gateway
  template:
    metadata:
      labels:
        app: sovereignmind-gateway
    spec:
      containers:
      - name: gateway
        image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/sovereignmind-gateway:latest
        ports:
        - containerPort: 4000
        env:
        - name: GRPC_SERVER_ADDRESS
          value: "sovereignmind-fastapi-service:50051"
---
apiVersion: v1
kind: Service
metadata:
  name: sovereignmind-gateway-service
spec:
  ports:
  - port: 4000
    targetPort: 4000
  selector:
    app: sovereignmind-gateway
  type: NodePort
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sovereignmind-ingress
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sovereignmind-gateway-service
            port:
              number: 4000
